name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test API
    runs-on: ubuntu-latest
    env:
      CASE9_DISABLE_HF: "1"
      CASE9_LOG_PATH: artifacts/ci-predictions.jsonl
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -p no:cacheprovider

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build fallback image
        run: docker build -t case9-model-serving-lite .
